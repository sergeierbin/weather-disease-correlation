version: 2

sources:
  - name: raw
    schema: raw
    description: Raw data loaded by ingestion scripts — do not query directly in marts.
    tables:
      - name: patients
        description: Synthetic patients generated by Synthea (FHIR Patient resource).
      - name: encounters
        description: Healthcare visits from Synthea (FHIR Encounter resource).
      - name: conditions
        description: Diagnoses recorded during encounters (FHIR Condition resource).
      - name: weather
        description: Daily weather observations fetched via Meteostat.
      - name: icd_codes
        description: WHO ICD-10 disease classification codes.
